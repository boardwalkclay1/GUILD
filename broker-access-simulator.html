<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broker Access Simulator – The Guild</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="guild-style.css">

<style>
body {
  background: #000;
  color: #e6c37f;
  font-family: 'Cinzel', serif;
  margin: 0;
  padding: 0;
}

.section {
  width: 92%;
  max-width: 700px;
  margin: 0 auto;
  padding: 25px 0;
}

.module {
  background: rgba(20,20,20,0.85);
  border: 1px solid #e6c37f;
  border-radius: 16px;
  padding: 18px;
  margin: 20px 0;
}

.broker-btn {
  display: block;
  background: rgba(40,40,40,0.9);
  border: 1px solid #e6c37f;
  border-radius: 14px;
  padding: 14px;
  margin: 12px 0;
  text-decoration: none;
  color: #e6c37f;
  text-align: center;
}

.step {
  margin: 10px 0;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="section">
  <h1>Broker Access Simulator</h1>
  <p style="text-align:center; opacity:0.8;">Choose a broker and practice unlocking options.</p>

  <a class="broker-btn" onclick="loadSim('Chase')">Chase</a>
  <a class="broker-btn" onclick="loadSim('Webull')">Webull</a>
  <a class="broker-btn" onclick="loadSim('Robinhood')">Robinhood</a>
  <a class="broker-btn" onclick="loadSim('TD Ameritrade')">TD Ameritrade</a>

  <div id="simArea"></div>
</div>

<script>
function loadSim(broker) {
  const steps = {
    "Chase": [
      "Open Chase → Self‑Directed Investing",
      "Go to Account Management",
      "Tap Trading Permissions",
      "Enable Options Trading",
      "Fill out approval form",
      "Submit → Approved"
    ],
    "Webull": [
      "Open Webull",
      "Tap Menu → Options Trading",
      "Fill out questionnaire",
      "Select Level 2",
      "Submit → Approved"
    ],
    "Robinhood": [
      "Open Robinhood",
      "Tap Investing → Options",
      "Fill out form",
      "Submit → Approved"
    ],
    "TD Ameritrade": [
      "Open TD Ameritrade",
      "Go to Client Services",
      "Tap My Profile",
      "Request Options Approval",
      "Fill out form",
      "Submit → Approved"
    ]
  };

  let html = `<div class='module'><h2 style='text-align:center;'>${broker} Simulator</h2>`;
  steps[broker].forEach(s => {
    html += `<p class='step'>• ${s}</p>`;
  });
  html += `<p style='text-align:center; margin-top:20px;'>You are now approved.</p></div>`;

  document.getElementById("simArea").innerHTML = html;
}
</script>

</body>
</html>
