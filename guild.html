<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THE GUILD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="the-guild.png" />
  <link rel="apple-touch-icon" href="the-guild.png" />

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Marcellus+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="guild-style.css">

  <style>
    /* ADD TO HOME SCREEN BUTTON */
    #a2hs-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      background: rgba(0,0,0,0.75);
      border: 2px solid #D4AF37;
      border-radius: 12px;
      color: #D4AF37;
      font-family: "Marcellus SC", serif;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      z-index: 9999;
      display: none;
    }
    #a2hs-btn:hover {
      background: rgba(212,175,55,0.2);
    }
  </style>
</head>

<body data-bg="Vestry.jpg">

  <!-- FOG + PILLARS -->
  <div class="fog-layer"></div>
  <div class="pillar pillar-left"></div>
  <div class="pillar pillar-right"></div>

  <!-- GOLDEN FORMULA TOP BAR -->
  <div class="gf-topbar">
    <button class="gf-btn gold-bar">☰ Golden Formula</button>

    <div class="gf-dropdown">
      <div class="gf-title">The Golden Formula Engine</div>
      <p>
        Upload any chart screenshot and the Guildmaster reveals the path.
      </p>
      <button class="enter-btn" onclick="openGF()">ENTER</button>
    </div>
  </div>

  <!-- PAGE TITLE -->
  <div class="gold-scroll">
    <h1 class="scroll-title" id="page-title">PAGE TITLE HERE</h1>
  </div>

  <!-- MAIN CONTENT SECTIONS -->
  <div class="content" id="guild-content">
    <!-- PAGE-SPECIFIC CONTENT GOES HERE -->
  </div>

  <!-- ADD TO HOME SCREEN -->
  <button id="a2hs-btn">Add to Home Screen</button>

  <script>
    function go(page) { window.location.href = page; }

    function openGF() {
      if (localStorage.getItem("gf_subscriber") === "paid") {
        window.location.href = "guild-goldenformula.html";
      } else {
        window.location.href = "gf-paywall.html";
      }
    }

    document.querySelector('.gf-btn').addEventListener('click', () => {
      document.querySelector('.gf-dropdown').classList.toggle('open');
    });

    let deferredPrompt;
    const a2hsBtn = document.getElementById("a2hs-btn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      a2hsBtn.style.display = "block";
    });

    a2hsBtn.addEventListener("click", () => {
      a2hsBtn.style.display = "none";
      deferredPrompt.prompt();
      deferredPrompt = null;
    });
  </script>

</body>
</html>
