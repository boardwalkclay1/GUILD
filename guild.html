<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>THE GUILD — VESTRY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="the-guild.png" />
  <link rel="apple-touch-icon" href="the-guild.png" />

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Marcellus+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="guild-style.css">
</head>

<!-- THIS IS THE IMPORTANT PART -->
<body data-bg="Vestry.jpg">

  <!-- FOG + PILLARS -->
  <div class="fog-layer"></div>
  <div class="pillar pillar-left"></div>
  <div class="pillar pillar-right"></div>

  <!-- GOLDEN FORMULA TOP BAR -->
  <div class="gf-topbar">
    <button class="gf-btn gold-bar">☰ Golden Formula</button>

    <div class="gf-dropdown">
      <div class="gf-title">The Golden Formula Engine</div>
      <p>Upload any chart screenshot and the Guildmaster reveals the path.</p>
      <button class="enter-btn" onclick="openGF()">ENTER</button>
    </div>
  </div>

  <!-- TOP NAVIGATION -->
  <div class="top-nav">
    <a onclick="go('guild.html')">Guild Hall</a>
    <a onclick="go('training-hall.html')">Training Hall</a>
    <a onclick="go('inside-the-guild.html')">Inside the Guild</a>
    <a onclick="go('guild-family.html')">Guild Family</a>
    <a onclick="go('glossary.html')">Glossary</a>
    <a onclick="go('golden-rules.html')">Golden Rules</a>
    <a onclick="go('guild-discipline.html')">Guild Discipline</a>
  </div>

  <!-- PAGE TITLE -->
  <div class="gold-scroll open">
    <h1 class="scroll-title">VESTRY CHAMBER</h1>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content" id="guild-content">
    <p style="text-align:center; margin-top:200px; font-size:1.4rem;">
      This is the Vestry chamber. Your background is now working.
    </p>
  </div>

  <!-- BACKGROUND OVERRIDE SCRIPT (THE FIX) -->
  <script>
    const bg = document.body.getAttribute("data-bg");
    if (bg) {
      document.body.style.backgroundImage = `url("image/${bg}")`;
    }
  </script>

  <!-- NAV + GF LOGIC -->
  <script>
    function go(page) { window.location.href = page; }

    function openGF() {
      if (localStorage.getItem("gf_subscriber") === "paid") {
        window.location.href = "Gf/simulator.html";
      } else {
        window.location.href = "gf-paywall.html";
      }
    }

    document.querySelector('.gf-btn').addEventListener('click', () => {
      document.querySelector('.gf-dropdown').classList.toggle('open');
    });
  </script>

</body>
</html>
