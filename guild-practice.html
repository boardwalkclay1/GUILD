<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guild Options Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Guild Options Practice</h1>

<div class="step-box chain-wrapper">
  <h2>Practice Options Chain</h2>
  <p class="chain-header">
    Calls on the left. Puts on the right. Click any contract to open a Limit Order ticket.
  </p>

  <div id="chainContainer"></div>

  <p class="hint">
    • You must enter the <strong>ASK</strong> to simulate a real fill.<br>
    • Total cost = price × 100 × contracts.
  </p>

  <div id="orderLog" class="order-log"></div>
</div>

<script src="guild-practice.js"></script>
</body>
</html>
