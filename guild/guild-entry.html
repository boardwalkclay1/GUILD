<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guild Entry – $50 Contribution</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="guild-style.css">
<script src="guild-engine.js" defer></script>

<style>
  .entry-container {
    max-width: 600px;
    margin: 140px auto 80px;
    background: rgba(0,0,0,0.75);
    border: 2px solid #D4AF37;
    border-radius: 14px;
    padding: 30px;
    text-align: center;
    color: #D4AF37;
  }

  h1 {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
  }

  .qr {
    width: 220px;
    height: 220px;
    margin: 20px auto;
    border-radius: 12px;
    background: #fff;
    padding: 10px;
    object-fit: contain;
  }

  .btn {
    display: block;
    background: rgba(212,175,55,0.15);
    border: 1px solid #D4AF37;
    padding: 14px;
    margin: 20px auto;
    width: 90%;
    max-width: 300px;
    border-radius: 10px;
    color: #D4AF37;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
  }

  .btn:hover {
    background: rgba(212,175,55,0.3);
  }

  input {
    width: 90%;
    max-width: 300px;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #D4AF37;
    background: rgba(0,0,0,0.6);
    color: #D4AF37;
    text-align: center;
  }
</style>
</head>

<body data-bg="Tributum.jpg">

<div class="fog-layer"></div>
<div class="pillar pillar-left"></div>
<div class="pillar pillar-right"></div>

<h1>Guild Entry</h1>

<div class="entry-container">
  <p>Your contribution unlocks the Guild on this device for 30 days.</p>
  <p><strong>Amount: $50</strong></p>

  <img class="qr" src="Entry-qrcode.png" alt="Guild Entry QR Code">

  <a id="paypalBtn" class="btn" target="_blank">Pay with PayPal</a>

  <p>Create your Guild login:</p>

  <input id="username" type="text" placeholder="Create username">
  <input id="password" type="password" placeholder="Create password">

  <button class="btn" onclick="unlock()">Unlock Guild</button>
</div>

<script>
  const PAYPAL_LINK = "https://www.paypal.com/ncp/payment/WT7W6ADE5WZKY";
  document.getElementById("paypalBtn").href = PAYPAL_LINK;

  async function unlock() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
      alert("Enter a username and password.");
      return;
    }

    // ADMIN BYPASS
    if (username.toLowerCase() === "boardwalk") {
      localStorage.setItem("guild_member", "paid");
      localStorage.setItem("guild_username", username);
      go("guild.html");
      return;
    }

    // 30 days
    const unlockUntil = Date.now() + (30 * 24 * 60 * 60 * 1000);

    // Save locally
    localStorage.setItem("guild_member", "paid");
    localStorage.setItem("guild_username", username);
    localStorage.setItem("guild_unlock_until", unlockUntil.toString());

    // Trigger GitHub workflow to write JSON
    await fetch("https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/workflows/unlock.yml/dispatches", {
      method: "POST",
      headers: {
        "Accept": "application/vnd.github+json",
        "Authorization": "Bearer YOUR_GITHUB_PAT"
      },
      body: JSON.stringify({
        ref: "main",
        inputs: {
          username: username,
          password: password,
          unlockUntil: unlockUntil.toString()
        }
      })
    });

    go("guild.html");
  }
</script>

</body>
</html>
