<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guild Entry – $50 Contribution</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    background: #000;
    color: #D4AF37;
    font-family: system-ui, sans-serif;
    padding: 25px;
    text-align: center;
  }

  .box {
    background: rgba(0,0,0,0.75);
    border: 2px solid #D4AF37;
    padding: 25px;
    border-radius: 12px;
    max-width: 600px;
    margin: 0 auto;
  }

  .qr {
    width: 220px;
    height: 220px;
    margin: 20px auto;
    border-radius: 12px;
    background: #fff;
    padding: 10px;
  }

  .btn {
    display: block;
    background: rgba(212,175,55,0.15);
    border: 1px solid #D4AF37;
    padding: 14px;
    margin: 20px auto;
    width: 90%;
    max-width: 300px;
    border-radius: 10px;
    color: #D4AF37;
    font-weight: 700;
    cursor: pointer;
  }

  .btn:hover {
    background: rgba(212,175,55,0.3);
  }

  input {
    width: 90%;
    max-width: 300px;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #D4AF37;
    background: rgba(0,0,0,0.6);
    color: #D4AF37;
    text-align: center;
  }
</style>
</head>

<body>

<h1>Guild Entry</h1>

<div class="box">
  <p>Your contribution unlocks the Guild on this device forever.</p>
  <p><strong>Amount: $50</strong></p>

  <img class="qr" id="qrImage" alt="QR Code">

  <a id="paypalBtn" class="btn" target="_blank">Pay with PayPal</a>

  <p>After payment, enter your email below to unlock:</p>

  <input id="email" type="email" placeholder="Enter your email">

  <button class="btn" onclick="unlock()">Unlock Guild</button>
</div>

<script>
  const PAYPAL_LINK = "https://www.paypal.com/ncp/payment/ARd1oNru6Zf29dveIxKlfKqU98ml3GroF55CXMmGFJt8JqOjbFXPi20fBax6LkDPyC-kqAzbrKgxEoYm";

  // Set PayPal button link
  document.getElementById("paypalBtn").href = PAYPAL_LINK;

  // Generate QR code
  const qrURL = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(PAYPAL_LINK);
  document.getElementById("qrImage").src = qrURL;

  // Unlock logic
  function unlock() {
    const email = document.getElementById("email").value.trim();
    if (!email) {
      alert("Enter your email to unlock.");
      return;
    }

    localStorage.setItem("guild_email", email);
    localStorage.setItem("guild_member", "paid");

    window.location.href = "guild.html";
  }
</script>

</body>
</html>
