<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guild Entry – $50 Contribution</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- GLOBAL CINEMATIC CSS -->
<link rel="stylesheet" href="guild-style.css">

<!-- GUILD ENGINE -->
<script src="guild-engine.js" defer></script>

<style>
  .entry-container {
    max-width: 600px;
    margin: 140px auto 80px;
    background: rgba(0,0,0,0.75);
    border: 2px solid #D4AF37;
    border-radius: 14px;
    padding: 30px;
    text-align: center;
    color: #D4AF37;
  }

  h1 {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
  }

  .qr {
    width: 220px;
    height: 220px;
    margin: 20px auto;
    border-radius: 12px;
    background: #fff;
    padding: 10px;
  }

  .btn {
    display: block;
    background: rgba(212,175,55,0.15);
    border: 1px solid #D4AF37;
    padding: 14px;
    margin: 20px auto;
    width: 90%;
    max-width: 300px;
    border-radius: 10px;
    color: #D4AF37;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
  }

  .btn:hover {
    background: rgba(212,175,55,0.3);
  }

  input {
    width: 90%;
    max-width: 300px;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #D4AF37;
    background: rgba(0,0,0,0.6);
    color: #D4AF37;
    text-align: center;
  }
</style>
</head>

<!-- CORRECT BACKGROUND IMAGE -->
<body data-bg="Tributum.jpg">

<!-- CINEMATIC LAYERS -->
<div class="fog-layer"></div>
<div class="pillar pillar-left"></div>
<div class="pillar pillar-right"></div>

<h1>Guild Entry</h1>

<div class="entry-container">
  <p>Your contribution unlocks the Guild on this device forever.</p>
  <p><strong>Amount: $50</strong></p>

  <img class="qr" id="qrImage" alt="QR Code">

  <a id="paypalBtn" class="btn" target="_blank">Pay with PayPal</a>

  <p>After payment, enter your email below to unlock:</p>

  <input id="email" type="email" placeholder="Enter your email">

  <button class="btn" onclick="unlock()">Unlock Guild</button>
</div>

<script>
  const PAYPAL_LINK =
    "https://www.paypal.com/ncp/payment/ARd1oNru6Zf29dveIxKlfKqU98ml3GroF55CXMmGFJt8JqOjbFXPi20fBax6LkDPyC-kqAzbrKgxEoYm";

  // Set PayPal button link
  document.getElementById("paypalBtn").href = PAYPAL_LINK;

  // Generate QR code
  const qrURL =
    "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
    encodeURIComponent(PAYPAL_LINK);
  document.getElementById("qrImage").src = qrURL;

  // Unlock logic
  function unlock() {
    const email = document.getElementById("email").value.trim();
    if (!email) {
      alert("Enter your email to unlock.");
      return;
    }

    localStorage.setItem("guild_email", email);
    localStorage.setItem("guild_member", "paid");

    go("guild.html");
  }
</script>

</body>
</html>
