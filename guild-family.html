<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Guild Family</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- GLOBAL CINEMATIC CSS -->
  <link rel="stylesheet" href="guild-style.css">

  <!-- GUILD ENGINE -->
  <script src="guild-engine.js" defer></script>

  <style>
    .family-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 120px 20px 80px;
      color: #D4AF37;
      text-align: center;
      line-height: 1.6;
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 25px;
      font-size: 2rem;
    }

    p {
      max-width: 650px;
      margin: 0 auto 20px;
      color: #D4AF37;
      opacity: 0.85;
      font-size: 1.05rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 35px;
      color: #00ff6a;
      text-decoration: none;
      font-weight: 600;
      letter-spacing: 0.08em;
      transition: 0.3s ease;
    }

    .back-link:hover {
      color: #fff;
      text-shadow: 0 0 10px #00ff6a;
    }
  </style>
</head>

<!-- CORRECT BACKGROUND IMAGE -->
<body data-bg="Vestry.jpg">

  <!-- CINEMATIC LAYERS -->
  <div class="fog-layer"></div>
  <div class="pillar pillar-left"></div>
  <div class="pillar pillar-right"></div>

  <div class="family-container">

    <h1>The Guild Family</h1>

    <p>
      The Guild is a family.  
      We lift each other up.  
      If one of us falls, we all reach down and pull them back up.
    </p>

    <p>
      You may stumble during this learning process.  
      That is normal.  
      We are here together — and I will be with you the whole way.
    </p>

    <a class="back-link" onclick="go('index.html')">← Back to Hall</a>

  </div>

</body>
</html>
