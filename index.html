<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Guild Gates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="the-guild.png" />
  <link rel="apple-touch-icon" href="the-guild.png" />

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Marcellus+SC&display=swap" rel="stylesheet">

  <!-- Guild assets -->
  <link rel="stylesheet" href="guild/guild-style.css">
  <script src="guild/guild-engine.js" defer></script>

  <style>
    .login-panel {
      max-width: 420px;
      margin: 40px auto 60px;
      padding: 25px;
      background: rgba(0,0,0,0.75);
      border: 2px solid #D4AF37;
      border-radius: 14px;
      text-align: center;
      color: #D4AF37;
    }

    .login-panel h2 {
      font-family: "Uncial Antiqua", serif;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .login-panel input {
      width: 90%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #D4AF37;
      background: rgba(0,0,0,0.6);
      color: #D4AF37;
      text-align: center;
    }

    .login-btn {
      margin-top: 18px;
      padding: 12px;
      width: 90%;
      border-radius: 10px;
      background: rgba(212,175,55,0.15);
      border: 1px solid #D4AF37;
      color: #D4AF37;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .login-btn:hover {
      background: rgba(212,175,55,0.3);
    }

    .new-here {
      margin-top: 20px;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .new-here a {
      color: #D4AF37;
      font-weight: bold;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>

<body data-bg="guild/Vestry.jpg">

  <!-- GOLDEN FORMULA TOP BAR -->
  <div class="gf-topbar">
    <button class="gf-btn gold-bar">☰ Golden Formula</button>

    <div class="gf-dropdown">
      <div class="gf-title">The Golden Formula Engine</div>
      <p>
        A one‑of‑a‑kind engine found only in The Guild.  
        Upload any chart screenshot and the Guildmaster reveals the path.
      </p>
      <button class="enter-btn" onclick="openGF()">ENTER</button>
    </div>
  </div>

  <!-- TOP NAV -->
  <div class="top-nav">
    <a onclick="go('guild/death-strike.html')">Death Strike</a>
    <a onclick="go('guild/colosseum.html')">The Colosseum</a>
    <a onclick="go('guild/guild-entry.html')">Inner Hall</a>
  </div>

  <!-- MAIN TITLE -->
  <div class="gold-scroll" id="scroll">
    <h1 class="scroll-title">The Guild Brotherhood & Sisterhood</h1>
  </div>

  <!-- LOGIN PANEL -->
  <div class="login-panel">
    <h2>Member Login</h2>
    <input id="loginUser" type="text" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="login-btn" onclick="login()">Enter the Guild</button>

    <div class="new-here">
      New to the Guild?  
      <br>
      <a onclick="go('guild/guild-entry.html')">Enter the Inner Hall</a>
    </div>
  </div>

  <!-- JS -->
  <script>
    function go(page) {
      window.location.href = page;
    }

    async function login() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value.trim();

      if (!username || !password) {
        alert("Enter username and password.");
        return;
      }

      // NEW: Cloudflare Worker login endpoint
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!data.ok) {
        alert("Invalid username or password.");
        return;
      }

      // Check membership
      if (Date.now() > data.unlock_until) {
        alert("Your access has expired. Renew in the Inner Hall.");
        return;
      }

      // Save session
      localStorage.setItem("guild_member", "paid");
      localStorage.setItem("guild_username", username);
      localStorage.setItem("guild_unlock_until", data.unlock_until);

      go("guild/guild.html");
    }

    function openGF() {
      if (localStorage.getItem("gf_subscriber") === "paid") {
        go("guild/guild-goldenformula.html");
      } else {
        go("guild/gf-paywall.html");
      }
    }

    document.querySelectorAll('.dropdown-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.nextElementSibling.classList.toggle('open');
      });
    });

    document.querySelector('.gf-btn').addEventListener('click', () => {
      document.querySelector('.gf-dropdown').classList.toggle('open');
    });
  </script>

</body>
</html>
