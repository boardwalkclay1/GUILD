<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Guild Gates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" href="/the-guild.png" />
  <link rel="apple-touch-icon" href="/the-guild.png" />

  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Marcellus+SC&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/guild/guild-style.css">
  <script src="/guild/guild-engine.js" defer></script>

  <link rel="stylesheet" href="/guild/guild-login.css">
</head>

<body data-bg="/guild/Vestry.jpg">

  <!-- TOP NAV -->
  <nav class="top-nav">
    <a onclick="go('/guild/death-strike.html')">Death Strike</a>
    <a onclick="go('/guild/colosseum.html')">The Colosseum</a>
    <a onclick="go('/guild/guild-entry.html')">Inner Hall</a>
    <a onclick="go('/guild/why-join.html')">Why Join the Guild</a>
  </nav>

  <!-- MAIN TITLE -->
  <header class="guild-header">
    <h1 class="guild-title">The Guild Brotherhood & Sisterhood</h1>
  </header>

  <!-- LOGIN PANEL -->
  <section class="login-panel">
    <h2 class="panel-title">Member Login</h2>

    <input id="loginUser" type="text" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Enter the Guild</button>

    <p class="new-here">
      New to the Guild?<br>
      <a onclick="go('/guild/guild-entry.html')">Enter the Inner Hall</a>
    </p>
  </section>

  <!-- QUICK ACCESS BUTTONS -->
  <section class="quick-links">
    <button class="login-btn" onclick="go('/guild/death-strike.html')">⚔️ Death Strike</button>
    <button class="login-btn" onclick="go('/guild/colosseum.html')">🏛️ The Colosseum</button>
    <button class="login-btn" onclick="go('/guild/guild-entry.html')">🜁 Inner Hall</button>
    <button class="login-btn" onclick="go('/guild/why-join.html')">✨ Why Join the Guild</button>
  </section>

  <script>
    function go(page) {
      window.location.href = page;
    }

    async function login() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value.trim();

      if (!username || !password) {
        alert("Enter username and password.");
        return;
      }

      let res;
      try {
        res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
      } catch (err) {
        alert("Network error. Try again.");
        return;
      }

      let data;
      try {
        data = await res.json();
      } catch {
        alert("Server error. Try again.");
        return;
      }

      if (!data || !data.ok) {
        alert("Invalid username or password.");
        return;
      }

      if (Date.now() > data.unlock_until && data.role !== "guild_master") {
        alert("Your access has expired. Renew in the Inner Hall.");
        return;
      }

      localStorage.setItem("guild_member", "paid");
      localStorage.setItem("guild_username", username);
      localStorage.setItem("guild_unlock_until", data.unlock_until);
      localStorage.setItem("guild_role", data.role);

      window.location.href = "/guild/guild.html";
    }
  </script>

</body>
</html>
