name: Build Market Oracle Data

on:
  schedule:
    - cron: "15 21 * * 1-5"  # 9:15 PM UTC on weekdays (adjust as you like)
  workflow_dispatch: {}

jobs:
  build-oracle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch raw data from Yahoo Finance
        run: |
          mkdir -p tmp

          # Top news / trending
          curl -s "https://query1.finance.yahoo.com/v1/finance/trending/US" > tmp/trending.json

          # Gainers / losers / most active
          curl -s "https://query1.finance.yahoo.com/v1/finance/screener/predefined/day_gainers" > tmp/gainers.json
          curl -s "https://query1.finance.yahoo.com/v1/finance/screener/predefined/day_losers" > tmp/losers.json
          curl -s "https://query1.finance.yahoo.com/v1/finance/screener/predefined/most_actives" > tmp/most_active.json

          # Earnings calendar (upcoming)
          curl -s "https://query1.finance.yahoo.com/v1/finance/calendar/upcoming" > tmp/earnings.json

      - name: Build market-oracle.json
        run: |
          NOW=$(date +%s000)

          # Extract simple lists from Yahoo responses (structure may need tweaking once you see real payloads)
          TOP_NEWS=$(jq '[.finance.result[0].quotes[]? | {symbol, shortName, regularMarketPrice, regularMarketChangePercent}]' tmp/trending.json)

          GAINERS=$(jq '[.finance.result[0].quotes[]? | {symbol, shortName, regularMarketPrice, regularMarketChangePercent}]' tmp/gainers.json)
          LOSERS=$(jq '[.finance.result[0].quotes[]? | {symbol, shortName, regularMarketPrice, regularMarketChangePercent}]' tmp/losers.json)
          MOST_ACTIVE=$(jq '[.finance.result[0].quotes[]? | {symbol, shortName, regularMarketPrice, regularMarketChangePercent, regularMarketVolume}]' tmp/most_active.json)

          # Penny stocks: from most active, price < 5
          PENNY=$(echo "$MOST_ACTIVE" | jq '[.[] | select(.regularMarketPrice < 5)]')

          # Earnings (you may need to inspect real structure and adjust)
          EARNINGS_THIS_WEEK=$(jq '.finance.result[0].events[]? // []' tmp/earnings.json 2>/dev/null || echo '[]')
          EARNINGS_NEXT_WEEK='[]' # placeholder unless you split by date ranges

          # Simple daily top 3: top 3 gainers by % change
          DAILY_TOP3=$(echo "$GAINERS" | jq 'sort_by(-.regularMarketChangePercent) | .[0:3]')

          # OptionsSignals placeholder (you can later loop tickers and hit options endpoints)
          OPTIONS_SIGNALS='[]'

          jq -n \
            --argjson topNews "$TOP_NEWS" \
            --argjson gainers "$GAINERS" \
            --argjson losers "$LOSERS" \
            --argjson mostActive "$MOST_ACTIVE" \
            --argjson penny "$PENNY" \
            --argjson dailyTop3 "$DAILY_TOP3" \
            --argjson earningsThisWeek "$EARNINGS_THIS_WEEK" \
            --argjson earningsNextWeek "$EARNINGS_NEXT_WEEK" \
            --argjson optionsSignals "$OPTIONS_SIGNALS" \
            --arg now "$NOW" \
            '{
              generatedAt: ($now | tonumber),
              topNews: $topNews,
              biggestMovers: {
                gainers: $gainers,
                losers: $losers,
                mostActive: $mostActive,
                trending: $topNews
              },
              optionsSignals: $optionsSignals,
              dailyTop3: $dailyTop3,
              earnings: {
                thisWeek: $earningsThisWeek,
                nextWeek: $earningsNextWeek
              },
              pennyStocks: $penny
            }' > data/market-oracle.json

      - name: Commit and push
        run: |
          git config user.name "Guild Oracle"
          git config user.email "actions@github.com"
          git add data/market-oracle.json
          git commit -m "Update market-oracle data"
          git push
